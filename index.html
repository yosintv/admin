<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YoSinTV API Admin</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
  margin-top:0;
  margin-bottom:20px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button,
select,
textarea{
  border:0;
  border-radius:10px;
  padding:12px;
  font-size:15px;
}

button{
  background:#22c55e;
  color:#04130a;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:.9;
  transform:translateY(-1px);
}

select{
  background:#334155;
  color:white;
}

textarea{
  width:100%;
  height:65vh;
  background:#020617;
  color:#d1fae5;
  font-family:monospace;
  font-size:14px;
  resize:vertical;
  line-height:1.5;

  white-space:pre-wrap;
  overflow-wrap:break-word;
  word-break:break-word;
}

.danger{
  background:#ef4444;
  color:white;
}

.blue{
  background:#38bdf8;
  color:#082f49;
}

#status{
  margin:0;
  font-weight:600;
}

#statusBox{
  display:none;
  transition:0.3s;
}

@media(max-width:768px){

  .row{
    flex-direction:column;
  }

  button,
  select{
    width:100%;
  }

}

</style>
</head>

<body>

<div class="wrap">

  <h1>YoSinTV API Admin</h1>

  <!-- TOP ACTIONS -->
  <div class="card">

    <div class="row">

      <select id="file">

        <option value="api/match-football.json">
          Football API
        </option>

        <option value="api/match-cricket.json">
          Cricket API
        </option>

        <option value="api/articles.json">
          Articles API
        </option>

      </select>

      <button onclick="loadFile()">
        Load JSON
      </button>

      <button onclick="saveFile()">
        Save to GitHub
      </button>

      <button class="blue" onclick="formatJson()">
        Format JSON
      </button>

      <button class="danger" onclick="clearEditor()">
        Clear
      </button>

    </div>

  </div>

  <!-- STATUS -->
  <div id="statusBox" class="card">
    <p id="status">Ready</p>
  </div>

  <!-- EDITOR -->
  <div class="card">

    <textarea
      id="editor"
      spellcheck="false"
      placeholder="Click Load JSON..."
    ></textarea>

  </div>

</div>

<script>

const API_URL = "/api/github";

function setStatus(msg,type="info"){

  const status =
    document.getElementById("status");

  const box =
    document.getElementById("statusBox");

  box.style.display = "block";

  status.innerText = msg;

  if(type==="success"){

    box.style.background = "#052e16";
    status.style.color = "#86efac";

  }

  else if(type==="error"){

    box.style.background = "#450a0a";
    status.style.color = "#fca5a5";

  }

  else{

    box.style.background = "#1e293b";
    status.style.color = "#e2e8f0";

  }
}

async function loadFile(){

  const file =
    document.getElementById("file").value;

  setStatus(
    "Loading " + file + "...",
    "info"
  );

  try{

    const res = await fetch(
      `${API_URL}?path=${encodeURIComponent(file)}`
    );

    const data = await res.json();

    if(!res.ok){

      throw new Error(
        data.message ||
        data.error ||
        "Load failed"
      );

    }

    document.getElementById("editor").value =
      JSON.stringify(
        data.content,
        null,
        2
      );

    setStatus(
      "✅ Loaded successfully: " + file,
      "success"
    );

  }catch(e){

    setStatus(
      "❌ " + e.message,
      "error"
    );

  }
}

async function saveFile(){

  const file =
    document.getElementById("file").value;

  const editor =
    document.getElementById("editor");

  let content;

  try{

    content = JSON.parse(editor.value);

  }catch(e){

    setStatus(
      "❌ Invalid JSON. Please fix before saving.",
      "error"
    );

    return;
  }

  setStatus(
    "Saving to GitHub...",
    "info"
  );

  try{

    const res = await fetch(
      API_URL,
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          path:file,
          content
        })
      }
    );

    const data = await res.json();

    if(!res.ok){

      throw new Error(
        data.message ||
        data.error ||
        "Save failed"
      );

    }

    setStatus(
      "✅ Saved successfully to GitHub: " + file,
      "success"
    );

  }catch(e){

    setStatus(
      "❌ " + e.message,
      "error"
    );

  }
}

function formatJson(){

  try{

    const editor =
      document.getElementById("editor");

    const json =
      JSON.parse(editor.value);

    editor.value =
      JSON.stringify(json,null,2);

    setStatus(
      "✅ JSON formatted successfully",
      "success"
    );

  }catch(e){

    setStatus(
      "❌ Invalid JSON",
      "error"
    );

  }
}

function clearEditor(){

  document.getElementById("editor").value = "";

  setStatus(
    "Editor cleared",
    "info"
  );
}

loadFile();

</script>

</body>
</html>
