<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YoSinTV API Admin</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#1e293b;border-radius:18px;padding:20px;margin-bottom:20px}
h1{margin-top:0}
.row{display:flex;gap:10px;flex-wrap:wrap}
button,select,textarea{border:0;border-radius:10px;padding:12px;font-size:15px}
button{background:#22c55e;color:#04130a;font-weight:700;cursor:pointer}
button:hover{opacity:.9}
select{background:#334155;color:white}
textarea{width:100%;height:65vh;background:#020617;color:#d1fae5;font-family:monospace;font-size:14px}
.danger{background:#ef4444;color:white}
.blue{background:#38bdf8;color:#082f49}
#status{margin:0;color:#e2e8f0}
</style>
</head>
<body>

<div class="wrap">
  <h1>YoSinTV API Admin</h1>

  <div class="card">
    <div class="row">
      <select id="file">
        <option value="api/match-football.json">Football API</option>
        <option value="api/match-cricket.json">Cricket API</option>
        <option value="api/articles.json">Articles API</option>
      </select>

      <button onclick="loadFile()">Load JSON</button>
      <button onclick="saveFile()">Save to GitHub</button>
      <button class="blue" onclick="formatJson()">Format JSON</button>
      <button class="danger" onclick="clearEditor()">Clear</button>
    </div>
  </div>

  <div class="card">
    <textarea id="editor" placeholder="Click Load JSON..."></textarea>
  </div>

  <div class="card">
    <p id="status">Ready</p>
  </div>
</div>

<script>
const API_URL = "/api/github";

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

async function loadFile(){
  const file = document.getElementById("file").value;
  setStatus("Loading " + file + "...");

  try{
    const res = await fetch(`${API_URL}?path=${encodeURIComponent(file)}`);
    const data = await res.json();

    if(!res.ok){
      throw new Error(data.message || data.error || "Load failed");
    }

    document.getElementById("editor").value =
      JSON.stringify(data.content, null, 2);

    setStatus("✅ Loaded: " + file);
  }catch(e){
    setStatus("❌ " + e.message);
  }
}

async function saveFile(){
  const file = document.getElementById("file").value;
  const editor = document.getElementById("editor");

  let content;

  try{
    content = JSON.parse(editor.value);
  }catch(e){
    setStatus("❌ Invalid JSON. Please fix before saving.");
    return;
  }

  setStatus("Saving to GitHub...");

  try{
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        path: file,
        content
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.message || data.error || "Save failed");
    }

    setStatus("✅ Saved successfully to GitHub: " + file);
  }catch(e){
    setStatus("❌ " + e.message);
  }
}

function formatJson(){
  try{
    const editor = document.getElementById("editor");
    const json = JSON.parse(editor.value);
    editor.value = JSON.stringify(json, null, 2);
    setStatus("✅ JSON formatted");
  }catch(e){
    setStatus("❌ Invalid JSON");
  }
}

function clearEditor(){
  document.getElementById("editor").value = "";
  setStatus("Editor cleared");
}

loadFile();
</script>

</body>
</html>
