<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YoSinTV API Admin</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
}

.wrap{
  max-width:1250px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:30px;
}

.badge{
  background:#16a34a;
  color:#052e16;
  padding:8px 14px;
  border-radius:999px;
  font-weight:700;
}

.card{
  background:#1e293b;
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 12px 35px rgba(0,0,0,.28);
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button,
select,
input{
  border:0;
  border-radius:12px;
  padding:13px 15px;
  font-size:15px;
}

select,
input{
  background:#334155;
  color:white;
}

input{
  min-width:260px;
  flex:1;
}

button{
  background:#22c55e;
  color:#04130a;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
  transform:translateY(-1px);
}

.blue{
  background:#38bdf8;
  color:#082f49;
}

.danger{
  background:#ef4444;
  color:#fff;
}

.editor-card{
  padding:0;
  overflow:hidden;
}

.editor-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  background:#020617;
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:12px 16px;
}

.editor-title{
  font-weight:800;
  color:#93c5fd;
}

.editor-actions{
  font-size:13px;
  color:#94a3b8;
}

textarea{
  width:100%;
  height:72vh;
  display:block;

  background:#020617;
  color:#d1fae5;

  font-family:"SFMono-Regular","Consolas","Liberation Mono",monospace;
  font-size:14px;
  line-height:1.65;

  border:0;
  outline:0;
  padding:20px;

  resize:vertical;

  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;

  overflow-x:hidden;
  overflow-y:auto;
}

textarea:focus{
  box-shadow:inset 0 0 0 2px #22c55e;
}

#status{
  margin:0;
  font-weight:700;
}

#statusBox{
  display:none;
}

.footer{
  text-align:center;
  opacity:.6;
  font-size:13px;
  padding-bottom:20px;
}

@media(max-width:768px){
  .row{
    flex-direction:column;
  }

  button,
  select,
  input{
    width:100%;
  }

  h1{
    font-size:24px;
  }

  textarea{
    height:66vh;
    font-size:13px;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <h1>YoSinTV API Admin</h1>
    <div class="badge">GitHub JSON Editor</div>
  </div>

  <div class="card">
    <div class="row">

      <select id="file">
        <option value="api/match-football.json">⚽ Football API</option>
        <option value="api/match-cricket.json">🏏 Cricket API</option>
        <option value="api/articles.json">📰 Articles API</option>
      </select>

      <input
        type="text"
        id="commitMessage"
        placeholder="GitHub commit note e.g. Updated today football matches"
      />

      <button onclick="loadFile()">Load JSON</button>
      <button onclick="saveFile()">Save to GitHub</button>
      <button class="blue" onclick="formatJson()">Format JSON</button>
      <button class="danger" onclick="clearEditor()">Clear</button>

    </div>
  </div>

  <div id="statusBox" class="card">
    <p id="status">Ready</p>
  </div>

  <div class="card editor-card">

    <div class="editor-top">
      <div class="editor-title" id="editorTitle">
        Editing: api/match-football.json
      </div>

      <div class="editor-actions">
        Soft Wrap ON · JSON Mode · Auto Load
      </div>
    </div>

    <textarea
      id="editor"
      spellcheck="false"
      placeholder="Click Load JSON..."
    ></textarea>

  </div>

  <div class="footer">
    YoSinTV API Manager · Powered by Vercel + GitHub API
  </div>

</div>

<script>
const API_URL = "/api/github";

function setStatus(msg,type="info"){

  const status = document.getElementById("status");
  const box = document.getElementById("statusBox");

  box.style.display = "block";
  status.innerText = msg;

  if(type === "success"){
    box.style.background = "#052e16";
    box.style.borderColor = "#16a34a";
    status.style.color = "#86efac";
  }

  else if(type === "error"){
    box.style.background = "#450a0a";
    box.style.borderColor = "#dc2626";
    status.style.color = "#fca5a5";
  }

  else{
    box.style.background = "#1e293b";
    box.style.borderColor = "rgba(255,255,255,.08)";
    status.style.color = "#e2e8f0";
  }
}

function updateEditorTitle(){
  const file = document.getElementById("file").value;
  document.getElementById("editorTitle").innerText = "Editing: " + file;
}

document.getElementById("file").addEventListener("change",function(){
  updateEditorTitle();
  loadFile();
});

async function loadFile(){

  const file = document.getElementById("file").value;
  updateEditorTitle();

  setStatus("Loading " + file + "...","info");

  try{

    const res = await fetch(
      `${API_URL}?path=${encodeURIComponent(file)}`
    );

    const data = await res.json();

    if(!res.ok){
      throw new Error(
        data.message ||
        data.error ||
        "Load failed"
      );
    }

    document.getElementById("editor").value =
      JSON.stringify(data.content,null,2);

    setStatus("✅ Loaded successfully: " + file,"success");

  }catch(e){

    setStatus("❌ " + e.message,"error");

  }
}

async function saveFile(){

  const file = document.getElementById("file").value;
  const editor = document.getElementById("editor");

  const commitMessage =
    document.getElementById("commitMessage").value.trim()
    || `Update ${file} from YoSinTV Admin`;

  let content;

  try{
    content = JSON.parse(editor.value);
  }catch(e){
    setStatus("❌ Invalid JSON. Please fix before saving.","error");
    return;
  }

  setStatus("Saving to GitHub...","info");

  try{

    const res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        path:file,
        content,
        message:commitMessage
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(
        data.message ||
        data.error ||
        "Save failed"
      );
    }

    setStatus("✅ Saved successfully to GitHub: " + commitMessage,"success");

  }catch(e){

    setStatus("❌ " + e.message,"error");

  }
}

function formatJson(){

  try{

    const editor = document.getElementById("editor");
    const json = JSON.parse(editor.value);

    editor.value = JSON.stringify(json,null,2);

    setStatus("✅ JSON formatted successfully","success");

  }catch(e){

    setStatus("❌ Invalid JSON","error");

  }
}

function clearEditor(){

  document.getElementById("editor").value = "";
  setStatus("Editor cleared","info");

}

loadFile();
</script>

</body>
</html>
